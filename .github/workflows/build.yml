name: Build Multi-Platform

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  GO_VERSION: '1.26'
  NODE_VERSION: '24'

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        shell: bash
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
          else
            VERSION="dev"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        continue-on-error: true
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('frontend/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend dependencies
        working-directory: frontend
        run: |
          pnpm install
          pnpm run generate-icon

      - name: Install UPX
        run: |
          choco install upx -y

      - name: Build application
        run: wails build -platform windows/amd64

      - name: Compress with UPX
        run: |
          upx --best --lzma "build\bin\SpotiFLAC.exe"

      - name: Prepare artifacts
        run: |
          mkdir -p dist
          Compress-Archive -Path "build\bin\SpotiFLAC.exe" -DestinationPath "dist\spotiflac-windows.zip" -Force

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-bundle
          path: dist/spotiflac-windows.zip
          retention-days: 7

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
          else
            VERSION="dev"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Get pnpm store directory
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        continue-on-error: true
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('frontend/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend dependencies
        working-directory: frontend
        run: |
          pnpm install
          pnpm run generate-icon

      - name: Build application
        run: wails build -platform darwin/universal

      - name: Create macOS bundle
        run: |
          mkdir -p dist
          ditto -c -k --sequesterRsrc --keepParent "build/bin/SpotiFLAC.app" "dist/spotiflac-macos-bundle.zip"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-bundle
          path: dist/spotiflac-macos-bundle.zip
          retention-days: 7

  build-linux:
    name: Build Linux (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            goarch: amd64
            runner: ubuntu-24.04
            appimage_arch: x86_64
          - arch: arm64
            goarch: arm64
            runner: ubuntu-24.04-arm
            appimage_arch: aarch64
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
          else
            VERSION="dev"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Get pnpm store directory
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        continue-on-error: true
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('frontend/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: |
          sudo apt-get update
          PACKAGES="libgtk-3-dev libwebkit2gtk-4.1-dev libfuse2 imagemagick"
          if [ "${{ matrix.goarch }}" = "amd64" ]; then
            PACKAGES="$PACKAGES upx-ucl"
          fi
          sudo apt-get install -y $PACKAGES

          # Create symlink for webkit2gtk-4.0 -> webkit2gtk-4.1 (Ubuntu 24.04 compatibility)
          MULTIARCH="$(dpkg-architecture -qDEB_HOST_MULTIARCH)"
          sudo ln -sf "/usr/lib/${MULTIARCH}/pkgconfig/webkit2gtk-4.1.pc" "/usr/lib/${MULTIARCH}/pkgconfig/webkit2gtk-4.0.pc"

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend dependencies
        working-directory: frontend
        run: |
          pnpm install
          pnpm run generate-icon

      - name: Build application
        run: wails build -platform linux/${{ matrix.goarch }}

      - name: Compress with UPX
        if: matrix.goarch == 'amd64'
        run: |
          upx --best --lzma build/bin/SpotiFLAC

      - name: Cache appimagetool
        id: cache-appimagetool
        uses: actions/cache@v4
        with:
          path: appimagetool
          key: appimagetool-${{ matrix.appimage_arch }}-v1

      - name: Download appimagetool
        if: steps.cache-appimagetool.outputs.cache-hit != 'true'
        run: |
          wget --timeout=30 --tries=5 --retry-connrefused --waitretry=5 -O appimagetool https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-${{ matrix.appimage_arch }}.AppImage || \
          wget --timeout=30 --tries=5 --retry-connrefused --waitretry=5 -O appimagetool https://github.com/AppImage/appimagetool/releases/download/1.9.1/appimagetool-${{ matrix.appimage_arch }}.AppImage

      - name: Make appimagetool executable
        run: chmod +x appimagetool

      - name: Create AppImage
        run: |
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/applications
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps

          # Copy binary
          cp build/bin/SpotiFLAC AppDir/usr/bin/

          # Create desktop file
          cat > AppDir/spotiflac.desktop << 'EOF'
          [Desktop Entry]
          Name=SpotiFLAC
          Exec=SpotiFLAC
          Icon=spotiflac
          Type=Application
          Categories=Audio;AudioVideo;
          Comment=Get Spotify tracks in true FLAC from Tidal/Deezer
          EOF

          cp AppDir/spotiflac.desktop AppDir/usr/share/applications/

          # Create icon
          if [ -f "build/appicon.png" ]; then
            convert build/appicon.png -resize 256x256 AppDir/spotiflac.png
          elif [ -f "frontend/public/icon.svg" ]; then
            convert -background none -size 256x256 frontend/public/icon.svg AppDir/spotiflac.png
          else
            echo "Warning: No icon found, building without icon"
          fi

          # Copy icon if exists
          if [ -f "AppDir/spotiflac.png" ]; then
            cp AppDir/spotiflac.png AppDir/usr/share/icons/hicolor/256x256/apps/
            cp AppDir/spotiflac.png AppDir/.DirIcon
          fi

          # Create AppRun
          cat > AppDir/AppRun << 'EOF'
          #!/bin/sh
          SELF=$(readlink -f "$0")
          HERE=${SELF%/*}
          export PATH="${HERE}/usr/bin/:${PATH}"
          export LD_LIBRARY_PATH="${HERE}/usr/lib/:${LD_LIBRARY_PATH}"
          exec "${HERE}/usr/bin/SpotiFLAC" "$@"
          EOF
          chmod +x AppDir/AppRun

          # Create AppImage
          mkdir -p dist
          if [ "${{ matrix.goarch }}" = "arm64" ]; then
            RELEASE_ARCH="arm64v8"
          else
            RELEASE_ARCH="amd64"
          fi
          ARCH=${{ matrix.appimage_arch }} ./appimagetool --no-appstream AppDir "dist/SpotiFLAC-${RELEASE_ARCH}.AppImage"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage-${{ matrix.arch }}
          path: dist/*.AppImage
          retention-days: 7

  create-release:
    name: Create Release
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -R artifacts

      - name: Create Linux bundle
        run: |
          mkdir -p release/SpotiFLAC-linux-bundle
          cp artifacts/linux-appimage-amd64/*.AppImage release/SpotiFLAC-linux-bundle/
          cp artifacts/linux-appimage-arm64/*.AppImage release/SpotiFLAC-linux-bundle/
          tar -czf release/spotiflac-linux-bundle.tar.gz -C release SpotiFLAC-linux-bundle

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          prerelease: false
          generate_release_notes: false
          body: |
            ## Changelog

            ## Downloads

            - `spotiflac-windows.zip` - amd64
            - `spotiflac-macos-bundle.zip` - amd64 + arm64
            - `spotiflac-linux-bundle.tar.gz` - amd64 + arm64v8

            <details>
            <summary><b>Linux Requirements</b></summary>

            The AppImage requires `webkit2gtk-4.1` to be installed on your system:

            Choose the correct AppImage after extracting the bundle:

            - `SpotiFLAC-amd64.AppImage` - amd64
            - `SpotiFLAC-arm64v8.AppImage` - arm64v8

            **Ubuntu/Debian:**
            ```bash
            sudo apt install libwebkit2gtk-4.1-0
            ```

            **Arch Linux:**
            ```bash
            sudo pacman -S webkit2gtk-4.1
            ```

            **Fedora:**
            ```bash
            sudo dnf install webkit2gtk4.1
            ```

            After installing the dependency, make the AppImage executable:
            ```bash
            tar -xzf spotiflac-linux-bundle.tar.gz
            chmod +x SpotiFLAC-*.AppImage
            ```

            </details>
          files: |
            artifacts/windows-bundle/*.zip
            artifacts/macos-bundle/*.zip
            release/spotiflac-linux-bundle.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
